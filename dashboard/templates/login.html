{% extends "base.html" %}
{% block content %}
<section class="login-card">
  <p class="eyebrow">Local network dashboard</p>
  <h1>BroEdenBot</h1>
  <p class="muted">Sign in with the dashboard credentials configured on the Pi.</p>
  {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
  {% if not dashboard_enabled %}
  <div class="alert warning">The dashboard is currently disabled.</div>
  {% endif %}
  <form method="post" action="{{ url_for('login') }}" class="stack">
    <input type="hidden" name="csrf" value="{{ csrf_token }}">
    <label>
      Username
      <input name="username" type="text" autocomplete="username" required autofocus>
    </label>
    <label>
      Password
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button class="button" type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
