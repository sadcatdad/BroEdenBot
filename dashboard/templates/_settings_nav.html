<aside class="settings-sidebar" aria-label="Settings sections">
  <div class="settings-sidebar-heading">
    <span class="eyebrow">Settings</span>
    <strong>Sections</strong>
  </div>
  <nav class="settings-menu">
    <a class="settings-menu-item {{ 'active' if current_path == '/settings' else '' }}" href="{{ url_for('settings') }}" {% if current_path == '/settings' %}aria-current="page"{% endif %}>Bot Configuration</a>
    <a class="settings-menu-item {{ 'active' if current_path == '/settings/permissions' else '' }}" href="{{ url_for('settings_permissions') }}" {% if current_path == '/settings/permissions' %}aria-current="page"{% endif %}>Permissions &amp; Access</a>
    <a class="settings-menu-item {{ 'active' if current_path == '/settings/discord' else '' }}" href="{{ url_for('settings_discord') }}" {% if current_path == '/settings/discord' %}aria-current="page"{% endif %}>Discord Roles &amp; Channels</a>
    <a class="settings-menu-item {{ 'active' if current_path == '/settings/features' else '' }}" href="{{ url_for('settings_features') }}" {% if current_path == '/settings/features' %}aria-current="page"{% endif %}>Feature Settings</a>
    <a class="settings-menu-item {{ 'active' if current_path == '/settings/imports' else '' }}" href="{{ url_for('imports') }}" {% if current_path == '/settings/imports' %}aria-current="page"{% endif %}>Imports</a>
    {% if can_manage_users %}<a class="settings-menu-item {{ 'active' if current_path == '/settings/users' else '' }}" href="{{ url_for('users_page') }}" {% if current_path == '/settings/users' %}aria-current="page"{% endif %}>Dashboard Users</a>{% endif %}
    <a class="settings-menu-item {{ 'active' if current_path == '/settings/advanced' else '' }}" href="{{ url_for('settings_advanced') }}" {% if current_path == '/settings/advanced' %}aria-current="page"{% endif %}>Advanced</a>
  </nav>
</aside>
